<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vendas — TSTechStore</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="assets/css/style.css">
  <script>const t=localStorage.getItem('ts-theme')||'dark';document.documentElement.setAttribute('data-theme',t);</script>
</head>
<body>
<div class="app-layout">
  <main class="main-content">
    <div class="page-content">

      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px">
        <div>
          <h1 class="page-title">Vendas</h1>
          <p class="page-subtitle">Histórico de todas as vendas</p>
        </div>
        <a href="vendas-nova.html" class="btn btn-primary">
          <i data-lucide="plus" style="width:15px;height:15px"></i>
          Nova Venda
        </a>
      </div>

      <!-- Stats -->
      <div class="grid-4" style="margin-bottom:20px">
        <div class="card" style="text-align:center;padding:14px">
          <div style="font-size:22px;font-weight:800" id="statTotalVendas">—</div>
          <div style="font-size:11.5px;color:var(--text-muted)">Total de Vendas</div>
        </div>
        <div class="card" style="text-align:center;padding:14px">
          <div style="font-size:18px;font-weight:800;color:var(--success)" id="statTotalValor">—</div>
          <div style="font-size:11.5px;color:var(--text-muted)">Valor Total</div>
        </div>
        <div class="card" style="text-align:center;padding:14px">
          <div style="font-size:22px;font-weight:800;color:var(--accent)" id="statAtivas">—</div>
          <div style="font-size:11.5px;color:var(--text-muted)">Ativas (Crediário)</div>
        </div>
        <div class="card" style="text-align:center;padding:14px">
          <div style="font-size:22px;font-weight:800;color:var(--success)" id="statQuitadas">—</div>
          <div style="font-size:11.5px;color:var(--text-muted)">Quitadas</div>
        </div>
      </div>

      <!-- Toolbar -->
      <div class="toolbar" style="margin-bottom:16px">
        <div class="search-bar">
          <i data-lucide="search" class="search-icon"></i>
          <input class="search-input" id="searchSales" type="text" placeholder="Buscar por cliente ou produto...">
        </div>
        <div class="filter-pills">
          <button class="filter-pill active" data-filter="todas" onclick="setSalesFilter('todas')">Todas</button>
          <button class="filter-pill" data-filter="ativa" onclick="setSalesFilter('ativa')">🔵 Ativas</button>
          <button class="filter-pill" data-filter="quitada" onclick="setSalesFilter('quitada')">✅ Quitadas</button>
          <button class="filter-pill" data-filter="cancelada" onclick="setSalesFilter('cancelada')">❌ Canceladas</button>
        </div>
      </div>

      <!-- Tabela -->
      <div class="table-wrapper">
        <table class="data-table">
          <thead>
            <tr>
              <th>Cliente</th>
              <th>Produto</th>
              <th>Tipo</th>
              <th>Valor</th>
              <th>Entrada</th>
              <th>Status</th>
              <th>Ações</th>
            </tr>
          </thead>
          <tbody id="salesBody">
            <!-- Injetado por vendas.js -->
          </tbody>
        </table>
      </div>

    </div>
  </main>
</div>

<script src="https://unpkg.com/lucide@latest"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="assets/js/supabase-client.js"></script>
<script src="assets/js/theme.js"></script>
<script src="assets/js/ui.js"></script>
<script src="assets/js/vendas.js"></script>
</body>
</html>
